<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>3D List Hover Effect💘</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <ul>
        <li style="--i:1;">
            <img src="./assets/GettyImages-2013892366.webp">
            <div class="content">
                <h4>Léa Seydoux </h4>
                <p>Liked your photo <br><span>20 apr at 15:30</span></p>
            </div>
        </li>
        <li style="--i:2;">
            <img src="./assets/tika-sumpter.webp">
            <div class="content">
                <h4>Kim Kardashian</h4>
                <p>commented your photo <br><span>2 days ago</span></p>
            </div>
        </li>
        <li style="--i:3;">
            <img src="./assets/26-20Cameron-20Diaz_0.webp">
            <div class="content">
                <h4>Cameron Diaz</h4>
                <p>reacted to your video <br><span>6 min ago</span></p>
            </div>
        </li>
        <li style="--i:4;">
            <img src="./assets/GettyImages-1540936189.webp">
            <div class="content">
                <h4>Emily Blunt</h4>
                <p>shared your post <br><span>32 seconds ago</span></p>
            </div>
        </li>
    </ul>
    <script src="script.js"></script>
</body>

</html>
